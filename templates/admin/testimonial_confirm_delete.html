{% extends 'base.html' %}

{% block title %}Удаление отзыва{% endblock %}

{% block page_title %}Удаление отзыва{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <p>Вы уверены, что хотите удалить отзыв <strong>{{ object.person_name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-footer">
                <button type="submit" class="btn btn-danger">Да, удалить</button>
                <a href="{% url 'admin_panel:testimonial_list' %}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
